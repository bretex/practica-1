<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarjeta Transferencia (Eco)</title>
    <style>
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            background-color: #f5f5f5; /* Gris muy suave en pantalla para diferenciar */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            width: 350px;
            padding: 40px;
            /* Borde sutil en lugar de fondo de color */
            border: 2px solid #333; 
            border-top: 10px solid #00d2ff; /* Único toque de color fuerte */
            border-radius: 8px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            color: #333;
            text-transform: uppercase;
            text-align: center;
            font-size: 20px;
            border-bottom: 1px dashed #ccc;
            padding-bottom: 15px;
        }

        .dato-row {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
        }

        .value {
            font-size: 18px;
            font-weight: bold;
            color: #000;
            text-align: right;
        }

        /* Destacar el RUT y Cuenta para lectura rápida */
        .highlight {
            font-size: 22px;
            color: #000;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #888;
            text-align: center;
            font-style: italic;
        }

        /* BOTÓN DE IMPRIMIR */
        .btn-print {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: white;
            border: 2px solid #00d2ff;
            color: #00d2ff;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        
        .btn-print:hover {
            background: #00d2ff;
            color: white;
        }

        /* MODO IMPRESIÓN (Aquí ocurre la magia del ahorro) */
        @media print {
            body { 
                background-color: white; 
                -webkit-print-color-adjust: exact;
            }
            .card {
                box-shadow: none; /* Sin sombras al imprimir */
                border: 2px solid black; /* Borde negro simple */
                border-top: 10px solid #00d2ff; /* Mantiene la franja de color */
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
            .btn-print { display: none; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Datos Bancarios</h2>
        
        <div class="dato-row">
            <span class="label">Banco</span>
            <span class="value">Bci/ Banco crédito e inversiones</span>
        </div>

        <div class="dato-row">
            <span class="label">Tipo</span>
            <span class="value">CUENTA CORRIENTE</span>
        </div>

        <div class="dato-row">
            <span class="label">N° Cuenta</span>
            <span class="value highlight">777919398129</span>
        </div>

        <div class="dato-row">
            <span class="label">RUT</span>
            <span class="value highlight">19.398.129-1</span>
        </div>

        <div class="dato-row">
            <span class="label">Titular</span>
            <span class="value">YOEL ANDRES GALLO MARIN</span>
        </div>

        <div class="dato-row">
            <span class="label">Email</span>
            <span class="value" style="font-size: 14px;">chystecm@gmail.com</span>
        </div>

        <button class="btn-print" onclick="window.print()">IMPRIMIR</button>
    </div>

</body>
</html>
